global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'walletdna'

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "walletdna"
    static_configs:
      - targets: ["walletdna:8000"]
    metrics_path: "/metrics"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
