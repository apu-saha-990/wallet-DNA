global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'chain']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 12h
  receiver: 'discord'
  routes:
    - match:
        severity: critical
      receiver: 'discord'
      repeat_interval: 1h

receivers:
  - name: 'discord'
    webhook_configs:
      - url: '${DISCORD_WEBHOOK_URL:-https://discord.com/api/webhooks/placeholder}'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          Chain: {{ .Labels.chain }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
