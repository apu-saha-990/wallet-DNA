[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = [
    "E501",   # line too long
    "E402",   # module level import not at top of file
    "N806",   # variable in function should be lowercase (STABLECOINS is intentional)
    "F841",   # local variable assigned but never used
]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
